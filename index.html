<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Menu Safa.Raya</title>
   
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #3b0606;
            margin: 0;
            padding: 0; 
            color: #f9f4f4;
        }

        .restaurant-header {
            background-color: #2a0404; 
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #f8b307; 
            margin-bottom: 30px;
        }

        .restaurant-name {
            margin: 0;
            font-size: 4em;
            color: #f8b307;
            font-family: 'Playfair Display', serif;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .tagline {
            color: #f9f4f4;
            font-style: italic;
            margin-top: 10px;
            font-size: 1.5em;
            opacity: 0.9;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px; 
        }

        .menu-card {
            background: rgb(103, 37, 37);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-8px);
        }

        .menu-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .menu-info { padding: 15px; text-align: center; }
        .menu-info h3 { margin: 0 0 10px; color: #f8b307; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.2em; }

        /* --- STYLE HALAMAN DETAIL (MODAL) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #4a0a0a;
            max-width: 800px;
            width: 100%;
            border-radius: 15px;
            border: 2px solid #f8b307;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-body { display: flex; flex-wrap: wrap; }
        .modal-img { flex: 1; min-width: 300px; }
        .modal-img img { width: 100%; height: 100%; object-fit: cover; }
        .modal-text { flex: 1.2; padding: 30px; min-width: 300px; }
        .modal-text h2 { color: #f8b307; font-family: 'Playfair Display', serif; font-size: 2.5em; margin-top: 0; }
        .modal-text p { line-height: 1.6; font-size: 1.1em; color: #f9f4f4; }
        
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            color: #f8b307; font-size: 2em; cursor: pointer; font-weight: bold;
        }

        .back-btn {
            background: #f8b307; color: #3b0606;
            border: none; padding: 10px 20px;
            font-weight: bold; border-radius: 5px;
            cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="restaurant-header">
        <h1 class="restaurant-name">Safa.Raya</h1>
        <p class="tagline">"Nak lemak, Nak Banyak, Nak Murah"</p>
    </header>

    <div class="menu-container">
        <div class="menu-card" onclick="openDetail('Ayam Geprek', 'Ayam goreng krispi dengan bumbu rahasia yang digeprek bersama sambal korek bawang pedas. Menu paling favorit untuk pecinta pedas!', 'Rp 15.000', 'ayam.jpg')">
            <img src="ayam.jpg" alt="Ayam Geprek">
            <div class="menu-info">
                <h3>Ayam Geprek</h3>
                <span class="price">Rp 15.000</span>
            </div>
        </div>

        <div class="menu-card" onclick="openDetail('Ikan Bakar', 'Ikan segar yang dibakar dengan bumbu olesan rempah tradisional yang meresap hingga ke dalam daging. Disajikan hangat dengan sambal terasi.', 'Rp 35.000', 'ikan.jpg')">
            <img src="ikan.jpg" alt="Ikan Bakar">
            <div class="menu-info">
                <h3>Ikan Bakar</h3>
                <span class="price">Rp 35.000</span>
            </div>
        </div>

        <div class="menu-card" onclick="openDetail('Pindang Patin', 'Kuliner khas Palembang yang legendaris. Ikan patin lembut dengan kuah bening yang asam segar dari buah nanas dan pedas cabe rawit.', 'Rp 45.000', 'patin.jpg')">
            <img src="patin.jpg" alt="Pindang Patin">
            <div class="menu-info">
                <h3>Pindang Patin</h3>
                <span class="price">Rp 45.000</span>
            </div>
        </div>

        <div class="menu-card" onclick="openDetail('Pindang Tulang', 'Iga sapi pilihan yang dimasak dengan kuah pindang kaya rempah. Cita rasa gurih dari sumsum tulang berpadu dengan kuah yang pedas dan asam segar.', 'Rp 55.000', 'tulang.jpg')">
            <img src="tulang.jpg" alt="Pindang Tulang">
            <div class="menu-info">
                <h3>Pindang Tulang</h3>
                <span class="price">Rp 55.000</span>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeDetail()">&times;</span>
            <div class="modal-body">
                <div class="modal-img">
                    <img id="detailImg" src="" alt="">
                </div>
                <div class="modal-text">
                    <h2 id="detailTitle"></h2>
                    <p id="detailDesc"></p>
                    <div class="price" id="detailPrice" style="font-size: 2em;"></div>
                    <button class="back-btn" onclick="closeDetail()">KEMBALI KE MENU</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openDetail(title, desc, price, img) {
            document.getElementById('detailTitle').innerText = title;
            document.getElementById('detailDesc').innerText = desc;
            document.getElementById('detailPrice').innerText = price;
            document.getElementById('detailImg').src = img;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeDetail() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('modalOverlay');
            if (event.target == modal) {
                closeDetail();
            }
        }
    </script>

</body>
</html>
